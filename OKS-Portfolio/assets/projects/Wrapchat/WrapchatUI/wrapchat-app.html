<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wrapchat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;background:#130C38;}
body{display:flex;align-items:flex-start;justify-content:center;font-family:'Nunito Sans',system-ui,sans-serif;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px;}
@keyframes blink{0%,80%,100%{opacity:.1}40%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(-36px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.fu {animation:fadeUp .38s cubic-bezier(.2,0,.1,1) both}
.fu2{animation:fadeUp .38s .08s cubic-bezier(.2,0,.1,1) both}
.fu3{animation:fadeUp .38s .16s cubic-bezier(.2,0,.1,1) both}
.fu4{animation:fadeUp .38s .24s cubic-bezier(.2,0,.1,1) both}
.sR {animation:slideR .26s cubic-bezier(.2,0,.1,1) both}
.sL {animation:slideL .26s cubic-bezier(.2,0,.1,1) both}
button{font-family:'Nunito Sans',system-ui,sans-serif;transition:all .15s;cursor:pointer;}
button:hover{opacity:.82;transform:scale(.98);}
button:active{opacity:.65;transform:scale(.95);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── Direction A tokens ────────────────────────────────────────────────────
const DA = {
  bg:     '#2A1969',
  text:   '#fff',
  muted:  'rgba(255,255,255,0.6)',
  faint:  'rgba(255,255,255,0.3)',
  teal:   '#3DC4BF',
  amber:  '#F5A84C',
  lime:   '#C2DC3A',
  blue:   '#6AAFD4',
  orange: '#E07040',
  purple: '#9B8FD8',
  dp:     "'Nunito',sans-serif",
  bp:     "'Nunito Sans',sans-serif",
};

// accent per report type
const RT_ACCENT = {
  general:  DA.teal,
  toxicity: DA.orange,
  lovelang: DA.amber,
  growth:   DA.lime,
  accounta: DA.blue,
  energy:   DA.amber,
};

// original per-section palette (bg=screen, inner=card, accent=highlights)
const PAL = {
  roast:    { bg:'#B83A10', inner:'#E8592A', accent:'#FF8B6A' },
  lovely:   { bg:'#7A1C48', inner:'#A02860', accent:'#F08EBF' },
  funny:    { bg:'#4A6A04', inner:'#6E9A08', accent:'#C8F06A' },
  stats:    { bg:'#083870', inner:'#0E5AAA', accent:'#6AB4F0' },
  ai:       { bg:'#1A3060', inner:'#2A4A90', accent:'#8AACF0' },
  upload:   { bg:'#2C1268', inner:'#4A1EA0', accent:'#A08AF0' },
  toxicity: { bg:'#3D0A0A', inner:'#8B1A1A', accent:'#E04040' },
  lovelang: { bg:'#3D1A2E', inner:'#8B3A5A', accent:'#F08EBF' },
  growth:   { bg:'#0A2E2E', inner:'#1A6B5A', accent:'#3AF0C0' },
  accounta: { bg:'#0A1A3D', inner:'#1A3A8B', accent:'#6AB4F0' },
  energy:   { bg:'#2E1A0A', inner:'#8B5A1A', accent:'#F0A040' },
  wrap:     { bg:'#601030', inner:'#901848', accent:'#F4A0C0' },
};
// accent hex → card inner bg (ACard auto-lookup)
const ACCENT_INNER = {};
Object.values(PAL).forEach(p=>{ ACCENT_INNER[p.accent]=p.inner; });
// report type → palette key
const RT_PAL = {
  general:'upload', toxicity:'toxicity', lovelang:'lovelang',
  growth:'growth',  accounta:'accounta', energy:'energy',
};

// section pill label per Shell "sec"
const PILL_LABEL = {
  roast:    'The Roast',
  lovely:   'The Lovely',
  funny:    'The Funny',
  stats:    'The Stats',
  ai:       'Insight',
  toxicity: 'Toxicity Report',
  lovelang: 'Love Language',
  growth:   'Growth Report',
  accounta: 'Accountability',
  energy:   'Energy Report',
  wrap:     'Wrapchat',
};

const PILL_COLOR = {
  roast: PAL.roast.accent, lovely: PAL.lovely.accent, funny: PAL.funny.accent,
  stats: PAL.stats.accent, ai: PAL.ai.accent,
  toxicity: PAL.toxicity.accent, lovelang: PAL.lovelang.accent, growth: PAL.growth.accent,
  accounta: PAL.accounta.accent, energy: PAL.energy.accent,
  wrap: 'rgba(255,255,255,0.82)',
};

// ── Geo shape ─────────────────────────────────────────────────────────────
function Geo({size=60,color,shape='sq-r',top,left,right,bottom,rotate=0,opacity=0.12}){
  return(
    <div style={{
      position:'absolute',top,left,right,bottom,zIndex:0,pointerEvents:'none',
      width:size,height:size,background:color,opacity,
      borderRadius:shape==='circle'?'50%':shape==='sq-r'?size*0.18:4,
      transform:`rotate(${rotate}deg)`,
    }}/>
  );
}

// ── Report type config ────────────────────────────────────────────────────
const REPORT_TYPES = [
  {id:'general', label:'General Wrapped',      desc:'Stats, AI insights, and your full chat personality.',       color:DA.teal},
  {id:'toxicity',label:'Toxicity Report',       desc:'Red flags, power imbalances, conflict patterns.',           color:DA.orange},
  {id:'lovelang',label:'Love Language Report',  desc:'How each person shows affection — mapped to the 5 types.', color:DA.amber},
  {id:'growth',  label:'Growth Report',         desc:'First 3 months vs last 3 months. Growing or drifting?',    color:DA.lime},
  {id:'accounta',label:'Accountability Report', desc:'Promises made and whether they were followed through.',     color:DA.blue},
  {id:'energy',  label:'Energy Report',         desc:'Who brings good energy vs drains it.',                     color:DA.amber},
];

// ── Shell ────────────────────────────────────────────────────────────────
// All screens live on the same #2A1969 bg; only result CARDS carry accent tints.
function Shell({sec,prog=0,total=0,onClose,onBack,geos,bg,children}){
  const pill = PILL_LABEL[sec];
  const pillColor = PILL_COLOR[sec] || DA.teal;
  return(
    <div style={{
      width:'min(430px,100vw)',minHeight:'100svh',background:bg||DA.bg,
      position:'relative',display:'flex',flexDirection:'column',
      flexShrink:0,overflow:'hidden',
      WebkitFontSmoothing:'antialiased',
    }}>
      {/* geo shapes in background */}
      {geos}
      {/* top progress bar */}
      <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'rgba(255,255,255,0.1)',zIndex:5}}>
        <div style={{height:'100%',background:'rgba(255,255,255,0.65)',borderRadius:'0 2px 2px 0',
          width:`${total>0?Math.round((prog/total)*100):0}%`,transition:'width .4s'}}/>
      </div>
      {/* section pill */}
      {pill&&(
        <div style={{position:'absolute',top:14,left:onBack?92:14,zIndex:10,
          background:`${pillColor}20`,border:`1px solid ${pillColor}50`,
          borderRadius:999,padding:'4px 12px',
          fontFamily:DA.bp,fontSize:11,fontWeight:700,
          color:pillColor,letterSpacing:'0.04em'}}>
          {pill}
        </div>
      )}
      {/* back button */}
      {onBack&&(
        <button onClick={onBack} style={{position:'absolute',top:10,left:14,zIndex:10,
          background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.14)',
          borderRadius:999,padding:'7px 14px',
          fontFamily:DA.bp,color:'rgba(255,255,255,0.7)',fontSize:13,fontWeight:700}}>
          ← Back
        </button>
      )}
      {/* close button */}
      {onClose&&(
        <button onClick={onClose} style={{position:'absolute',top:10,right:14,zIndex:10,
          background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.14)',
          borderRadius:999,width:34,height:34,
          fontFamily:DA.bp,color:'rgba(255,255,255,0.7)',fontSize:18,
          display:'flex',alignItems:'center',justifyContent:'center'}}>
          ×
        </button>
      )}
      {/* scrollable content */}
      <div style={{position:'relative',zIndex:2,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:20,padding:'58px 24px 56px',
        overflowY:'auto',flex:1}}>
        {children}
      </div>
    </div>
  );
}

// ── Typography ────────────────────────────────────────────────────────────
const Overline=({children})=>(
  <div className="fu" style={{fontFamily:DA.bp,fontSize:11,fontWeight:700,letterSpacing:'0.1em',
    textTransform:'uppercase',color:DA.faint,width:'100%'}}>
    {children}
  </div>
);
const Heading=({children,size=32})=>(
  <div className="fu" style={{fontFamily:DA.dp,fontWeight:900,fontSize:size,color:DA.text,
    letterSpacing:'-0.025em',lineHeight:1.05,width:'100%',textAlign:'center'}}>
    {children}
  </div>
);
const Sub=({children})=>(
  <div className="fu2" style={{fontFamily:DA.bp,fontSize:14,color:DA.muted,lineHeight:1.55,width:'100%'}}>
    {children}
  </div>
);
const BigStat=({children})=>(
  <div className="fu2" style={{fontFamily:DA.dp,fontWeight:900,fontSize:46,color:DA.text,
    letterSpacing:'-0.03em',lineHeight:1,textAlign:'center'}}>
    {children}
  </div>
);
const Quip=({children})=>(
  <div className="fu3" style={{fontFamily:DA.bp,fontSize:14,textAlign:'center',color:'rgba(255,255,255,0.82)',
    background:'rgba(255,255,255,0.07)',padding:'13px 18px',borderRadius:18,
    width:'100%',lineHeight:1.55,fontStyle:'italic',fontWeight:500}}>
    {children}
  </div>
);

// ── Accent card (result content card) ────────────────────────────────────
function ACard({accent,children,style={}}){
  return(
    <div className="fu2" style={{
      borderRadius:24,
      background:ACCENT_INNER[accent]||`${accent}22`,
      border:`1.5px solid ${accent}80`,
      padding:'22px 20px',width:'100%',
      position:'relative',overflow:'hidden',
      ...style,
    }}>
      {children}
    </div>
  );
}
// plain dark card for sub-info
function DCard({children,style={}}){
  return(
    <div className="fu2" style={{
      borderRadius:20,background:'rgba(255,255,255,0.05)',
      border:'1px solid rgba(255,255,255,0.1)',
      padding:'18px 18px',width:'100%',...style,
    }}>
      {children}
    </div>
  );
}

// ── Stat chips row inside accent card ────────────────────────────────────
function StatChips({chips,accent}){
  return(
    <div style={{display:'flex',gap:8,marginTop:18}}>
      {chips.map(([v,l])=>(
        <div key={l} style={{flex:1,background:'rgba(255,255,255,0.12)',borderRadius:14,padding:'10px 8px'}}>
          <div style={{fontFamily:DA.dp,fontWeight:800,fontSize:17,color:'#fff'}}>{v}</div>
          <div style={{fontFamily:DA.bp,fontSize:10,color:'rgba(255,255,255,0.6)',marginTop:2}}>{l}</div>
        </div>
      ))}
    </div>
  );
}

// ── Bar chart ────────────────────────────────────────────────────────────
function Bar({value,max,color,label}){
  const pct=max>0?Math.round((value/max)*100):0;
  return(
    <div style={{marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
        <span style={{fontFamily:DA.bp,fontSize:13,fontWeight:600,color:DA.text}}>{label}</span>
        <span style={{fontFamily:DA.bp,fontSize:13,color:DA.muted}}>{typeof value==='number'&&value<=100?`${value}%`:value.toLocaleString()}</span>
      </div>
      <div style={{height:9,borderRadius:999,background:'rgba(255,255,255,0.1)'}}>
        <div style={{height:'100%',width:`${pct}%`,borderRadius:999,background:color,transition:'width .7s ease'}}/>
      </div>
    </div>
  );
}

// ── Score ring ────────────────────────────────────────────────────────────
function ScoreRing({score,max=10,color}){
  const sz=120,sw=7,r=(sz-sw)/2,circ=2*Math.PI*r,pct=score/max;
  return(
    <div style={{position:'relative',width:sz,height:sz,margin:'0 auto'}}>
      <svg width={sz} height={sz} style={{transform:'rotate(-90deg)'}}>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={sw}/>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div style={{fontFamily:DA.dp,fontSize:32,fontWeight:900,color:'#fff',lineHeight:1}}>{score}</div>
        <div style={{fontFamily:DA.bp,fontSize:11,color:DA.faint}}>/ {max}</div>
      </div>
    </div>
  );
}

// ── Nav (Back / Next) ────────────────────────────────────────────────────
function Nav({onBack,onNext,showBack=true,nextLabel='Next →',accent,textColor}){
  const ac=accent||DA.teal;
  const tc=textColor||'#fff';
  return(
    <div style={{display:'flex',gap:10,width:'100%',marginTop:8}}>
      {showBack&&(
        <button onClick={onBack} style={{flex:1,padding:'14px',borderRadius:999,
          background:'rgba(255,255,255,0.10)',border:'1.5px solid rgba(255,255,255,0.18)',
          fontFamily:DA.bp,color:'rgba(255,255,255,0.75)',fontSize:15,fontWeight:700}}>
          ← Back
        </button>
      )}
      <button onClick={onNext} style={{flex:1,padding:'14px',borderRadius:999,
        background:ac,border:'none',
        fontFamily:DA.bp,color:tc,fontSize:15,fontWeight:800}}>
        {nextLabel}
      </button>
    </div>
  );
}

// ── Card label overline ───────────────────────────────────────────────────
const CLabel=({children,color})=>(
  <div style={{fontFamily:DA.bp,fontSize:11,fontWeight:700,letterSpacing:'0.08em',
    textTransform:'uppercase',color:color||DA.teal,marginBottom:12,textAlign:'center'}}>
    {children}
  </div>
);

// ── Toast ────────────────────────────────────────────────────────────────
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:'fixed',bottom:28,left:'50%',zIndex:9999,
      background:'rgba(18,8,50,0.97)',backdropFilter:'blur(16px)',
      borderRadius:999,padding:'12px 22px',color:'#fff',
      fontFamily:DA.bp,fontSize:14,fontWeight:600,
      boxShadow:'0 8px 40px rgba(0,0,0,0.55)',
      animation:'toastIn .3s ease',whiteSpace:'nowrap',
      transform:'translateX(-50%)'}}>
      {msg}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// SCREEN — AUTH
// ─────────────────────────────────────────────────────────────────────────
function AuthScreen({onLogin}){
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [busy,setBusy]=useState(false);
  const submit=()=>{
    if(!email||!pw)return;
    setBusy(true);setTimeout(()=>{setBusy(false);onLogin(email);},900);
  };
  const inp={width:'100%',background:'rgba(0,0,0,0.28)',border:'1.5px solid rgba(255,255,255,0.14)',
    borderRadius:16,padding:'14px 16px',fontSize:15,color:'#fff',outline:'none',fontFamily:DA.bp};
  return(
    <Shell geos={<>
      <Geo shape="sq-r" size={160} color={DA.amber} top={-50}  right={-60} rotate={28}  opacity={0.13}/>
      <Geo shape="sq-r" size={90}  color={DA.teal}  bottom={100} left={-28} rotate={-18} opacity={0.11}/>
      <Geo shape="circle" size={56} color={DA.lime} bottom={210} right={24}              opacity={0.09}/>
    </>}>
      {/* logo */}
      <div className="fu" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,marginBottom:8,marginTop:8}}>
        <img src="assets/WrapchatLogo_tr.png" width={96} height={96}
          style={{borderRadius:24,objectFit:'contain'}}
          onError={e=>{e.target.style.background='rgba(255,255,255,0.12)';e.target.style.padding='16px';}}/>
        <div style={{fontFamily:DA.dp,fontWeight:900,fontSize:36,color:DA.text,textAlign:'center',
          letterSpacing:'-0.025em',lineHeight:1.05}}>
          Unwrap your chats.
        </div>
        <div style={{fontFamily:DA.bp,fontSize:15,color:DA.muted,textAlign:'center',lineHeight:1.55,maxWidth:260}}>
          AI-powered relationship insights from your WhatsApp conversations.
        </div>
      </div>
      {/* tab toggle */}
      <div className="fu2" style={{display:'flex',background:'rgba(0,0,0,0.25)',borderRadius:999,padding:4,width:'100%',gap:4}}>
        {[['login','Log in'],['signup','Sign up']].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,border:'none',borderRadius:999,padding:'10px 0',
            fontFamily:DA.bp,fontSize:14,fontWeight:700,
            background:tab===t?'rgba(255,255,255,0.16)':'transparent',
            color:tab===t?'#fff':'rgba(255,255,255,0.36)',letterSpacing:.2}}>
            {l}
          </button>
        ))}
      </div>
      {/* inputs */}
      <div className="fu3" style={{width:'100%',display:'flex',flexDirection:'column',gap:10}}>
        <input type="email" placeholder="Email" value={email}
          onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} style={inp}/>
        <input type="password" placeholder="Password" value={pw}
          onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} style={inp}/>
      </div>
      <button onClick={submit} disabled={busy} className="fu4" style={{width:'100%',padding:'16px',borderRadius:999,
        border:'none',background:'#fff',fontFamily:DA.bp,fontWeight:700,fontSize:16,
        color:DA.bg,opacity:busy?.65:1}}>
        {busy?'…':tab==='login'?'Log in':'Create account'}
      </button>
      <div className="fu4" style={{fontFamily:DA.bp,fontSize:12,color:DA.faint,textAlign:'center'}}>
        By signing in you agree to our Terms &amp; Privacy Policy
      </div>
    </Shell>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// SCREEN — UPLOAD
// ─────────────────────────────────────────────────────────────────────────
function UploadScreen({onDemo,onHistory,onLogout,userEmail}){
  const [toast,setToast]=useState(null);
  const reject=()=>setToast("Chat uploads are disabled in this demo — tap \"Try demo chat\" to explore the app.");
  return(
    <Shell geos={<>
      <Geo shape="sq-r" size={110} color={DA.teal}  top={80}   right={-32} rotate={22} opacity={0.09}/>
      <Geo shape="sq-r" size={72}  color={DA.amber} bottom={140} left={-22} rotate={12} opacity={0.08}/>
      <Geo shape="circle" size={48} color={DA.lime} bottom={260} right={20}             opacity={0.07}/>
    </>}>
      {/* brand */}
      <div className="fu" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,marginBottom:4,marginTop:4}}>
        <img src="assets/WrapchatLogo_tr.png" width={72} height={72}
          style={{borderRadius:18,objectFit:'contain'}}
          onError={e=>{e.target.style.display='none';}}/>
      </div>
      {/* step label + heading */}
      <div className="fu2" style={{width:'100%'}}>
        <Overline>Upload your chat</Overline>
        <div style={{fontFamily:DA.dp,fontWeight:900,fontSize:32,color:DA.text,
          letterSpacing:'-0.02em',lineHeight:1.05,marginTop:6,marginBottom:4}}>
          Drop your chat.
        </div>
        <div style={{fontFamily:DA.bp,fontSize:14,color:DA.muted}}>
          Export from WhatsApp and upload it here.
        </div>
      </div>
      {/* drop zone */}
      <label onClick={reject} className="fu3" style={{width:'100%',height:200,borderRadius:28,
        border:'2px dashed rgba(255,255,255,0.16)',background:'rgba(255,255,255,0.03)',
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        gap:14,cursor:'pointer',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',width:90,height:90,borderRadius:'50%',background:DA.teal,
          opacity:0.1,filter:'blur(28px)',top:'50%',left:'50%',transform:'translate(-50%,-50%)'}}/>
        <div style={{width:60,height:60,position:'relative',flexShrink:0}}>
          <div style={{position:'absolute',inset:0,borderRadius:14,background:'rgba(255,255,255,0.08)',transform:'rotate(8deg)'}}/>
          <div style={{position:'absolute',inset:6,borderRadius:10,background:DA.teal,opacity:0.28,transform:'rotate(-4deg)'}}/>
        </div>
        <div style={{textAlign:'center',position:'relative'}}>
          <div style={{fontFamily:DA.dp,fontWeight:700,fontSize:17,color:DA.text,marginBottom:4}}>
            WhatsApp export
          </div>
          <div style={{fontFamily:DA.bp,fontSize:13,color:DA.muted}}>.txt or .zip file</div>
        </div>
      </label>
      {/* CTAs */}
      <div className="fu4" style={{width:'100%',display:'flex',flexDirection:'column',gap:10}}>
        <button onClick={onDemo} style={{width:'100%',padding:'16px',borderRadius:999,
          background:DA.teal,border:'none',
          fontFamily:DA.bp,fontWeight:700,fontSize:16,color:DA.bg}}>
          Try demo chat
        </button>
        <button onClick={onHistory} style={{width:'100%',padding:'12px',borderRadius:999,
          background:'transparent',border:'1.5px solid rgba(255,255,255,0.16)',
          fontFamily:DA.bp,fontWeight:600,fontSize:14,color:DA.muted}}>
          View past wraps ›
        </button>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontFamily:DA.bp,fontSize:12,color:'rgba(255,255,255,0.28)',fontWeight:600}}>{userEmail}</span>
        <span style={{color:'rgba(255,255,255,0.15)',fontSize:11}}>·</span>
        <button onClick={onLogout} style={{background:'transparent',border:'none',

    </>,
    <>
      <div style={{width:'100%',paddingTop:4}}><Overline>Energy Report</Overline></div>
      <ACard accent={ac}>
        <Geo shape="sq-r" size={80} color={ac} top={-20} right={-20} rotate={18} opacity={0.18}/>
        <div style={{position:'relative',zIndex:2}}>
          <CLabel color={ac}>Your energy</CLabel>
          <div style={{fontFamily:DA.bp,fontSize:14,color:DA.muted,lineHeight:1.75,marginBottom:10}}>More reactive than proactive. Warm and affirming when present. You amplify Taylor's energy rather than generating your own — which still works.</div>
          <div style={{fontFamily:DA.bp,fontSize:13,color:'rgba(255,255,255,0.55)',fontStyle:'italic'}}>You score lower mainly because you initiate less. That's different from draining energy.</div>
        </div>
      </ACard>
      {nav}
    </>,
    <>
      <div style={{width:'100%',paddingTop:4}}><Overline>Energy Report</Overline></div>
      <ACard accent={ac}>
        <Geo shape="sq-r" size={70} color={ac} top={-16} right={-16} rotate={22} opacity={0.18}/>
        <div style={{position:'relative',zIndex:2}}>
          <CLabel color={ac}>Most draining moment</CLabel>
          <div style={{fontFamily:DA.bp,fontSize:14,color:DA.muted,lineHeight:1.75}}>Tuesday evenings. Both of you tend to vent work stress simultaneously — amplifying rather than absorbing each other's negativity. It passes quickly, but it's consistent.</div>
        </div>
      </ACard>
      <Quip>"Tuesday is the only villain in this chat."</Quip>
      {nav}
    </>,
    <>
      <div style={{width:'100%',paddingTop:4}}><Overline>Energy Report</Overline></div>
      <ACard accent={ac}>
        <Geo shape="sq-r" size={90} color={ac} top={-22} right={-22} rotate={18} opacity={0.18}/>
        <div style={{position:'relative',zIndex:2}}>
          <CLabel color={ac}>Final read</CLabel>
          <div style={{fontFamily:DA.dp,fontWeight:900,fontSize:24,color:DA.text,lineHeight:1.15,marginBottom:12}}>"Taylor brings the hype. You bring the warmth. It balances out."</div>
          <div style={{fontFamily:DA.bp,fontSize:13,color:DA.muted,lineHeight:1.65}}>Energy compatibility is high. No one is draining the other. The dynamic is sustainable. Try initiating more — Taylor responds well to it.</div>

      <div style={{fontFamily:DA.bp,fontSize:11,color:DA.faint,textAlign:'center'}}>Powered by AI — your messages never left your device.</div>
      {nav}
    </>,
  ];
  return <RShell sec="energy" prog={i+1} total={total} onClose={onClose} step={step}>{screens[i]}</RShell>;
}

// ─────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────
function App(){
  const [phase,setPhase]=useState('auth');
  const [userEmail,setUserEmail]=useState('');
  const [selectedReports,setSelectedReports]=useState(['general']);
  const [resultType,setResultType]=useState('general');
  const [resultStep,setResultStep]=useState(0);

  const go=p=>{setResultStep(0);setPhase(p);};
  const toggleReport=id=>setSelectedReports(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const openResult=type=>{setResultType(type);setResultStep(0);setPhase('results');};
  const closeResult=()=>{setResultStep(0);setPhase('my-results');};
  const nextStep=()=>setResultStep(s=>s+1);
  const prevStep=()=>{if(resultStep>0)setResultStep(s=>s-1);else closeResult();};
  const rp={step:resultStep,back:prevStep,next:nextStep,onClose:closeResult,onRestart:()=>go('upload')};

  if(phase==='auth')          return<AuthScreen onLogin={e=>{setUserEmail(e);go('upload');}}/>;
  if(phase==='upload')        return<UploadScreen userEmail={userEmail} onDemo={()=>go('rel-select')} onHistory={()=>go('my-results')} onLogout={()=>{setUserEmail('');go('auth');}}/>;
  if(phase==='rel-select')    return<RelSelectScreen onSelect={()=>go('report-select')} onBack={()=>go('upload')}/>;
  if(phase==='report-select') return<ReportSelectScreen selected={selectedReports} onToggle={toggleReport} onRun={()=>go('loading')} onBack={()=>go('rel-select')}/>;
  if(phase==='loading')       return<LoadingScreen onDone={()=>{setResultType(selectedReports[0]||'general');go('results');}}/>;
  if(phase==='results'){
    switch(resultType){
      case'toxicity':return<ToxicityResult  {...rp}/>;
      case'lovelang':return<LoveLangResult  {...rp}/>;
      case'growth':  return<GrowthResult    {...rp}/>;
      case'accounta':return<AccountaResult  {...rp}/>;
      case'energy':  return<EnergyResult    {...rp}/>;
      default:       return<GeneralResult   {...rp}/>;
    }
  }
  if(phase==='my-results')    return<MyResultsScreen onBack={()=>go('upload')} onOpen={openResult}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
