<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wrapchat — UI Exploration</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body,#root { width:100%; height:100%; }
body { background:#EDECEA; font-family:'Nunito Sans',sans-serif; overflow-x:hidden; }
.row-scroll { display:flex; gap:32px; overflow-x:auto; padding:0 60px 40px; scroll-padding:60px; }
.row-scroll::-webkit-scrollbar { height:5px; }
.row-scroll::-webkit-scrollbar-track { background:transparent; }
.row-scroll::-webkit-scrollbar-thumb { background:#C8C4BA; border-radius:3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── TOKENS ────────────────────────────────────────────────────────────────
const DA = {
  bg:'#2A1969', text:'#fff', muted:'rgba(255,255,255,0.6)', faint:'rgba(255,255,255,0.3)',
  teal:'#3DC4BF', amber:'#F5A84C', lime:'#C2DC3A', blue:'#6AAFD4', orange:'#E07040',
  dp:"'Nunito',sans-serif", bp:"'Nunito Sans',sans-serif",
};
const DB = {
  bg:'#FAF9F6', card:'#fff', purple:'#2A1969',
  text:'#201E18', sec:'#4A4840', muted:'#8A8678',
  border:'#E0DDD5', n100:'#F2F0EB',
  teal:'#3DC4BF', amber:'#F5A84C', lime:'#C2DC3A', blue:'#6AAFD4', orange:'#E07040',
  dp:"'Nunito',sans-serif", bp:"'Nunito Sans',sans-serif",
};

// ─── PHONE SHELLS ──────────────────────────────────────────────────────────
function PhoneA({ children }) {
  return (
    <div style={{ width:390,height:844,borderRadius:52,overflow:'hidden',position:'relative',background:DA.bg,
      boxShadow:'0 28px 56px rgba(0,0,0,0.32),0 0 0 1.5px rgba(0,0,0,0.22)',WebkitFontSmoothing:'antialiased',flexShrink:0 }}>
      <div style={{ position:'absolute',top:12,left:'50%',transform:'translateX(-50%)',width:120,height:35,borderRadius:20,background:'#000',zIndex:200,pointerEvents:'none' }} />
      <div style={{ position:'absolute',top:18,left:32,fontSize:15,fontWeight:700,fontFamily:'system-ui',zIndex:100,color:'rgba(255,255,255,0.75)',pointerEvents:'none' }}>9:41</div>
      <div style={{ position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',width:134,height:5,borderRadius:3,background:'rgba(255,255,255,0.35)',zIndex:200,pointerEvents:'none' }} />
      <div style={{ position:'absolute',inset:0 }}>{children}</div>
    </div>
  );
}
function PhoneB({ children }) {
  return (
    <div style={{ width:390,height:844,borderRadius:52,overflow:'hidden',position:'relative',background:DB.bg,
      boxShadow:'0 24px 48px rgba(0,0,0,0.15),0 0 0 1.5px rgba(0,0,0,0.10)',WebkitFontSmoothing:'antialiased',flexShrink:0 }}>
      <div style={{ position:'absolute',top:12,left:'50%',transform:'translateX(-50%)',width:120,height:35,borderRadius:20,background:'#000',zIndex:200,pointerEvents:'none' }} />
      <div style={{ position:'absolute',top:18,left:32,fontSize:15,fontWeight:700,fontFamily:'system-ui',zIndex:100,color:DB.text,pointerEvents:'none' }}>9:41</div>
      <div style={{ position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',width:134,height:5,borderRadius:3,background:'rgba(0,0,0,0.14)',zIndex:200,pointerEvents:'none' }} />
      <div style={{ position:'absolute',inset:0 }}>{children}</div>
    </div>
  );
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
function Geo({ size=60,color,shape='sq',top,left,right,bottom,rotate=0,opacity=0.12 }) {
  const s={ position:'absolute',top,left,right,bottom,zIndex:1,pointerEvents:'none' };
  return <div style={{ ...s,width:size,height:size,background:color,opacity,borderRadius:shape==='circle'?'50%':shape==='sq-r'?size*0.18:4,transform:`rotate(${rotate}deg)` }} />;
}

const REPORTS_A = [
  {id:'general', name:'General',       desc:'Overall vibe & relationship read', color:DA.teal,   icon:'◈'},
  {id:'toxicity',name:'Toxicity',       desc:'Red flags & conflict patterns',    color:DA.orange, icon:'⚡'},
  {id:'lovelang',name:'Love Language',  desc:'How you both show up',             color:DA.amber,  icon:'♡'},
  {id:'growth',  name:'Growth',         desc:'Then vs. now trajectory',          color:DA.lime,   icon:'↗'},
  {id:'accounta',name:'Accountability', desc:'Promises kept and broken',         color:DA.blue,   icon:'◎'},
  {id:'energy',  name:'Energy',         desc:'Who drives the conversation',      color:DA.amber,  icon:'◑'},
];

// ─── DIRECTION A SCREENS ────────────────────────────────────────────────────
function A_Auth() {
  return <PhoneA>
    <div style={{ height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'60px 32px 40px',position:'relative',overflow:'hidden' }}>
      <Geo shape="sq-r" size={160} color={DA.amber} top={-50} right={-60} rotate={28} opacity={0.13}/>
      <Geo shape="sq-r" size={90}  color={DA.teal}  bottom={100} left={-28} rotate={-18} opacity={0.11}/>
      <Geo shape="circle" size={56} color={DA.lime} bottom={210} right={24} opacity={0.09}/>
      <div style={{ position:'relative',zIndex:2,width:'100%',display:'flex',flexDirection:'column',alignItems:'center' }}>
        <img src="assets/WrapchatLogo_tr.png" width="96" height="96" style={{ borderRadius:24,marginBottom:28 }}/>
        <div style={{ fontFamily:DA.dp,fontWeight:900,fontSize:36,color:DA.text,textAlign:'center',letterSpacing:'-0.025em',lineHeight:1.05,marginBottom:10 }}>Unwrap your chats.</div>
        <div style={{ fontFamily:DA.bp,fontSize:15,color:DA.muted,textAlign:'center',lineHeight:1.55,marginBottom:44,maxWidth:260 }}>AI-powered relationship insights from your WhatsApp conversations.</div>
        <div style={{ width:'100%',display:'flex',flexDirection:'column',gap:12 }}>
          <button style={{ width:'100%',padding:'16px',borderRadius:999,background:'#fff',border:'none',fontFamily:DA.bp,fontWeight:700,fontSize:16,color:DA.bg,cursor:'pointer' }}>Continue with Google</button>
          <button style={{ width:'100%',padding:'15px',borderRadius:999,background:'transparent',border:'1.5px solid rgba(255,255,255,0.18)',fontFamily:DA.bp,fontWeight:600,fontSize:15,color:DA.text,cursor:'pointer' }}>Sign in with email</button>
        </div>
        <div style={{ marginTop:20,fontFamily:DA.bp,fontSize:12,color:DA.faint,textAlign:'center' }}>By signing in you agree to our Terms &amp; Privacy Policy</div>
      </div>
    </div>
  </PhoneA>;
}

function A_Upload() {
  return <PhoneA>
    <div style={{ height:'100%',display:'flex',flexDirection:'column',padding:'60px 24px 32px',position:'relative',overflow:'hidden' }}>
      <Geo shape="sq-r" size={110} color={DA.teal}  top={90}    right={-32} rotate={22} opacity={0.09}/>
      <Geo shape="sq-r" size={72}  color={DA.amber} bottom={160} left={-22} rotate={12} opacity={0.08}/>
      <div style={{ position:'relative',zIndex:2,flex:1,display:'flex',flexDirection:'column' }}>
        <div style={{ paddingTop:10,marginBottom:8 }}>
          <div style={{ fontFamily:DA.bp,fontSize:11,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:DA.faint,marginBottom:8 }}>Step 1 of 3</div>
          <div style={{ fontFamily:DA.dp,fontWeight:900,fontSize:32,color:DA.text,letterSpacing:'-0.02em',lineHeight:1.05,marginBottom:6 }}>Drop your chat.</div>
          <div style={{ fontFamily:DA.bp,fontSize:14,color:DA.muted }}>Export from WhatsApp and upload it here.</div>
        </div>
        <div style={{ flex:1,display:'flex',alignItems:'center',justifyContent:'center' }}>
          <div style={{ width:'100%',height:240,borderRadius:28,border:'2px dashed rgba(255,255,255,0.18)',background:'rgba(255,255,255,0.04)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,position:'relative',overflow:'hidden' }}>
            <div style={{ position:'absolute',width:100,height:100,borderRadius:'50%',background:DA.teal,opacity:0.12,filter:'blur(30px)',top:'50%',left:'50%',transform:'translate(-50%,-50%)' }}/>
            <div style={{ width:60,height:60,borderRadius:16,background:'rgba(255,255,255,0.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,position:'relative' }}>📂</div>
            <div style={{ textAlign:'center',position:'relative' }}>
              <div style={{ fontFamily:DA.dp,fontWeight:700,fontSize:17,color:DA.text,marginBottom:4 }}>WhatsApp export</div>
              <div style={{ fontFamily:DA.bp,fontSize:13,color:DA.muted }}>.txt or .zip file</div>
            </div>
          </div>
        </div>
        <div style={{ display:'flex',flexDirection:'column',gap:10 }}>
          <button style={{ width:'100%',padding:'16px',borderRadius:999,background:DA.teal,border:'none',fontFamily:DA.bp,fontWeight:700,fontSize:16,color:DA.bg,cursor:'pointer' }}>Browse files</button>
          <button style={{ width:'100%',padding:'12px',borderRadius:999,background:'transparent',border:'none',fontFamily:DA.bp,fontWeight:600,fontSize:14,color:DA.muted,cursor:'pointer' }}>View past wraps ›</button>
        </div>
      </div>
    </div>
  </PhoneA>;
}

function A_Relationship() {
  const [sel,setSel] = useState('partner');
  const cats=[{id:'partner',label:'Partner',color:DA.teal},{id:'dating',label:'Dating',color:DA.amber},{id:'ex',label:'Ex',color:DA.orange},{id:'family',label:'Family',color:DA.blue},{id:'friend',label:'Friend',color:DA.lime},{id:'work',label:'Work',color:'#9B8FD8'},{id:'other',label:'Other',color:'rgba(255,255,255,0.4)'}];
  return <PhoneA>
    <div style={{ height:'100%',display:'flex',flexDirection:'column',padding:'60px 24px 32px' }}>
      <div style={{ paddingTop:10,marginBottom:28 }}>
        <div style={{ fontFamily:DA.bp,fontSize:11,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:DA.faint,marginBottom:8 }}>Step 2 of 3</div>
        <div style={{ fontFamily:DA.dp,fontWeight:900,fontSize:30,color:DA.text,lineHeight:1.1,marginBottom:8 }}>Who's this chat with?</div>
        <div style={{ fontFamily:DA.bp,fontSize:14,color:DA.muted }}>Helps us frame the analysis correctly.</div>
      </div>
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,flex:1 }}>
        {cats.map(r=>(
          <div key={r.id} onClick={()=>setSel(r.id)} style={{ borderRadius:18,border:`2px solid ${sel===r.id?r.color:'rgba(255,255,255,0.08)'}`,background:sel===r.id?`${r.color}1A`:'rgba(255,255,255,0.04)',padding:'18px 16px',cursor:'pointer',display:'flex',flexDirection:'column',gap:6,transition:'all 0.15s' }}>
            {sel===r.id&&<div style={{ width:8,height:8,borderRadius:'50%',background:r.color,marginBottom:2 }}/>}
            <div style={{ fontFamily:DA.dp,fontWeight:700,fontSize:16,color:sel===r.id?r.color:DA.text }}>{r.label}</div>
          </div>
        ))}
      </div>
      <button style={{ marginTop:20,width:'100%',padding:'16px',borderRadius:999,background:DA.amber,border:'none',fontFamily:DA.bp,fontWeight:700,fontSize:16,color:DA.bg,cursor:'pointer' }}>Continue →</button>
    </div>
  </PhoneA>;
}

function A_ReportSelect() {
  const [sel,setSel] = useState(['general','lovelang']);
  const toggle = id => setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  return <PhoneA>
    <div style={{ height:'100%',display:'flex',flexDirection:'column',padding:'60px 24px 24px' }}>
      <div style={{ paddingTop:10,marginBottom:16 }}>
        <div style={{ fontFamily:DA.bp,fontSize:11,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:DA.faint,marginBottom:8 }}>Step 3 of 3</div>
        <div style={{ fontFamily:DA.dp,fontWeight:900,fontSize:26,color:DA.text,lineHeight:1.1,marginBottom:6 }}>What do you want to uncover?</div>
        <div style={{ fontFamily:DA.bp,fontSize:13,color:DA.muted }}>Pick one or more · each uses 1 credit.</div>
      </div>
      <div style={{ flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:8 }}>
        {REPORTS_A.map(r=>{
          const on=sel.includes(r.id);
          return <div key={r.id} onClick={()=>toggle(r.id)} style={{ borderRadius:16,border:`2px solid ${on?r.color:'rgba(255,255,255,0.08)'}`,background:on?`${r.color}15`:'rgba(255,255,255,0.04)',padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:12,transition:'all 0.15s' }}>
            <div style={{ width:36,height:36,borderRadius:10,background:on?r.color:'rgba(255,255,255,0.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:on?DA.bg:DA.muted,flexShrink:0 }}>{r.icon}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:DA.dp,fontWeight:700,fontSize:15,color:on?r.color:DA.text }}>{r.name}</div>
              <div style={{ fontFamily:DA.bp,fontSize:11,color:DA.faint,marginTop:1 }}>{r.desc}</div>
            </div>
            <div style={{ width:22,height:22,borderRadius:6,border:`2px solid ${on?r.color:'rgba(255,255,255,0.2)'}`,background:on?r.color:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0 }}>
              {on&&<span style={{ fontSize:11,color:DA.bg,fontWeight:900 }}>✓</span>}
            </div>
          </div>;
        })}
      </div>
      <div style={{ marginTop:14 }}>
        <div style={{ fontFamily:DA.bp,fontSize:12,color:DA.faint,textAlign:'center',marginBottom:10 }}>{sel.length} report{sel.length!==1?'s':''} · {sel.length} credit{sel.length!==1?'s':''} · 12 remaining</div>
        <button style={{ width:'100%',padding:'16px',borderRadius:999,background:sel.length?DA.teal:'rgba(255,255,255,0.1)',border:'none',fontFamily:DA.bp,fontWeight:700,fontSize:16,color:sel.length?DA.bg:DA.muted,cursor:sel.length?'pointer':'not-allowed',transition:'all 0.2s' }}>
          {sel.length?`Analyze (${sel.length})`:'Select a report'}
        </button>
      </div>
    </div>
  </PhoneA>;
}

function A_Loading() {
  return <PhoneA>
    <div style={{ height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'60px 32px 48px',position:'relative',overflow:'hidden' }}>
      <Geo shape="sq-r" size={130} color={DA.lime}  top={70}    right={-44} rotate={32}  opacity={0.1}/>
      <Geo shape="sq-r" size={80}  color={DA.blue}  bottom={90} left={-18}  rotate={-16} opacity={0.1}/>
      <Geo shape="circle" size={50} color={DA.amber} bottom={170} right={28} opacity={0.12}/>
      <div style={{ position:'relative',width:96,height:96,marginBottom:36,flexShrink:0 }}>
        {[{c:DA.amber,t:0,l:0},{c:DA.teal,t:0,l:52},{c:DA.lime,t:52,l:0},{c:DA.blue,t:52,l:52}].map((s,i)=>(
          <div key={i} style={{ position:'absolute',top:s.t,left:s.l,width:44,height:44,background:s.c,borderRadius:8,opacity:0.92 }}/>
        ))}
        <div style={{ position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:12,height:12,background:DA.bg,borderRadius:3,zIndex:10 }}/>
      </div>
      <div style={{ fontFamily:DA.dp,fontWeight:900,fontSize:28,color:DA.text,textAlign:'center',letterSpacing:'-0.02em',marginBottom:8 }}>Unwrapping…</div>
      <div style={{ fontFamily:DA.bp,fontSize:14,color:DA.muted,textAlign:'center',marginBottom:36 }}>Alex Rivera · 1,247 messages</div>
      <div style={{ width:'100%',display:'flex',flexDirection:'column',gap:14 }}>
        {[{name:'General Report',pct:68,on:true},{name:'Love Language',pct:0,on:false}].map(r=>(
          <div key={r.name}>
            <div style={{ display:'flex',justifyContent:'space-between',marginBottom:6 }}>
              <span style={{ fontFamily:DA.bp,fontSize:13,fontWeight:600,color:r.on?DA.teal:DA.faint }}>{r.name}</span>
              <span style={{ fontFamily:DA.bp,fontSize:13,color:r.on?DA.teal:DA.faint }}>{r.on?`${r.pct}%`:'Queued'}</span>
            </div>
            <div style={{ height:4,borderRadius:999,background:'rgba(255,255,255,0.08)' }}>
              {r.on&&<div style={{ height:'100%',width:`${r.pct}%`,borderRadius:999,background:DA.teal }}/>}
            </div>
          </div>
        ))}
      </div>
    </div>
  </PhoneA>;
}

function A_Results({ cs }) {
  const radius = cs==='sharp'?4:cs==='pill'?32:22;
  return <PhoneA>
    <div style={{ height:'100%',display:'flex',flexDirection:'column',paddingTop:60 }}>
      <div style={{ padding:'14px 20px',display:'flex',alignItems:'center',gap:12 }}>
        <div style={{ width:36,height:36,borderRadius:10,background:DA.teal,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:DA.dp,fontWeight:900,fontSize:14,color:DA.bg,flexShrink:0 }}>G</div>
        <div>
          <div style={{ fontFamily:DA.dp,fontWeight:700,fontSize:14,color:DA.text }}>General Report</div>
          <div style={{ fontFamily:DA.bp,fontSize:11,color:DA.muted }}>Alex Rivera · Jordan Kim</div>
        </div>
        <div style={{ flex:1 }}/>
        <button style={{ background:'transparent',border:'none',color:DA.muted,fontSize:20,cursor:'pointer',padding:'4px 8px' }}>↑</button>
      </div>
      <div style={{ flex:1,padding:'4px 18px 12px',display:'flex',flexDirection:'column' }}>
        <div style={{ flex:1,borderRadius:radius,background:'rgba(61,196,191,0.10)',border:'1.5px solid rgba(61,196,191,0.25)',padding:'24px 20px',display:'flex',flexDirection:'column',justifyContent:'space-between',overflow:'hidden',position:'relative' }}>
          <Geo shape="sq-r" size={90} color={DA.teal} top={-24} right={-24} rotate={18} opacity={0.14}/>
          <div style={{ position:'relative',zIndex:2 }}>
            <div style={{ fontFamily:DA.bp,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:DA.teal,marginBottom:12 }}>Overall Vibe</div>
            <div style={{ fontFamily:DA.dp,fontWeight:900,fontSize:28,color:DA.text,lineHeight:1.1,letterSpacing:'-0.02em',marginBottom:14 }}>"Warm, playful, and deeply trusting."</div>
            <div style={{ fontFamily:DA.bp,fontSize:14,color:DA.muted,lineHeight:1.6 }}>This chat reads like two people who genuinely enjoy each other's company. Humor is the primary bonding mechanism.</div>
          </div>
          <div style={{ display:'flex',gap:8,marginTop:18,position:'relative',zIndex:2 }}>
            {[['1,247','messages'],['8 mo','history'],['Alex','talks more']].map(([v,l])=>(
              <div key={l} style={{ flex:1,background:'rgba(255,255,255,0.06)',borderRadius:radius*0.5,padding:'10px 8px' }}>
                <div style={{ fontFamily:DA.dp,fontWeight:800,fontSize:17,color:DA.teal }}>{v}</div>
                <div style={{ fontFamily:DA.bp,fontSize:10,color:DA.faint,marginTop:2 }}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{ display:'flex',justifyContent:'center',gap:20,marginTop:16,position:'relative',zIndex:2 }}>
            <button style={{ background:'transparent',border:'none',fontFamily:DA.bp,fontSize:12,color:DA.faint,cursor:'pointer' }}>👍 Accurate</button>
            <button style={{ background:'transparent',border:'none',fontFamily:DA.bp,fontSize:12,color:DA.faint,cursor:'pointer' }}>🚩 Flag issue</button>
          </div>
        </div>
      </div>
      <div style={{ padding:'0 18px 28px',display:'flex',alignItems:'center',gap:12 }}>
        <div style={{ flex:1,display:'flex',gap:4 }}>
          {[0,1,2,3,4].map(i=><div key={i} style={{ flex:1,height:3,borderRadius:999,background:i===0?DA.teal:'rgba(255,255,255,0.12)' }}/>)}
        </div>
        <span style={{ fontFamily:DA.bp,fontSize:12,color:DA.faint }}>1 / 5</span>
      </div>
    </div>
  </PhoneA>;
}

function A_History() {
  const rpts=[{name:'Alex Rivera',type:'General',color:DA.teal,date:'Today'},{name:'Design Team',type:'Toxicity',color:DA.orange,date:'Yesterday'},{name:'Sam Chen',type:'Love Language',color:DA.amber,date:'Mon'},{name:'Jordan K.',type:'Growth',color:DA.lime,date:'Mar 14'}];
  return <PhoneA>
    <div style={{ height:'100%',display:'flex',flexDirection:'column',paddingTop:60 }}>
      <div style={{ padding:'14px 24px 16px',display:'flex',alignItems:'baseline',justifyContent:'space-between' }}>

        <button style={{ background:'transparent',border:'none',fontFamily:DA.bp,fontSize:14,fontWeight:600,color:DA.teal,cursor:'pointer' }}>+ New</button>
      </div>
      <div style={{ flex:1,overflowY:'auto',padding:'0 20px',display:'flex',flexDirection:'column',gap:10 }}>
        {rpts.map((r,i)=>(
          <div key={i} style={{ borderRadius:18,background:'rgba(255,255,255,0.05)',border:'1.5px solid rgba(255,255,255,0.08)',padding:'16px 18px',display:'flex',alignItems:'center',gap:14,cursor:'pointer' }}>

              <div style={{ width:18,height:18,borderRadius:4,background:r.color }}/>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:DA.dp,fontWeight:700,fontSize:15,color:DA.text,marginBottom:2 }}>{r.name}</div>
              <div style={{ fontFamily:DA.bp,fontSize:12,color:DA.muted }}>{r.type} · {r.date}</div>
            </div>
            <span style={{ color:DA.faint,fontSize:20 }}>›</span>

        ))}

    </div>

function App() {
  const [showTweaks,setShowTweaks] = useState(false);
  const [cs, setCs] = useState(TWEAK_DEFAULTS.cardStyle);

  useEffect(()=>{
    const handler = e => {
      if (e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  const handleSetCs = s => { setCs(s); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{cardStyle:s}},'*'); };

  const aScreens = [<A_Auth/>,<A_Upload/>,<A_Relationship/>,<A_ReportSelect/>,<A_Loading/>,<A_Results cs={cs}/>,<A_History/>];
  const bScreens = [<B_Auth/>,<B_Upload/>,<B_Relationship/>,<B_ReportSelect/>,<B_Loading/>,<B_Results cs={cs}/>,<B_History/>];

  return (
    <div style={{ minHeight:'100%',paddingBottom:80 }}>
      {/* Canvas header */}
      <div style={{ position:'sticky',top:0,zIndex:100,background:'rgba(237,236,234,0.92)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(0,0,0,0.06)',padding:'14px 60px',display:'flex',alignItems:'center',gap:20 }}>

        <div style={{ fontFamily:"'Nunito Sans',sans-serif",fontSize:13,color:'rgba(60,50,40,0.5)' }}>2 directions · 7 screens each · mobile-first</div>
      </div>

      <SectionRow title="A · Unwrap" subtitle="Bold / editorial / playful" color={DA.teal}>
        {aScreens.map((s,i)=><Artboard key={i} label={SCREENS_A[i]}>{s}</Artboard>)}

      <SectionRow title="B · Clarity" subtitle="Clean / minimal / data-forward" color={DB.purple}>
        {bScreens.map((s,i)=><Artboard key={i} label={SCREENS_B[i]}>{s}</Artboard>)}
      </SectionRow>
    </div>
  );
}
