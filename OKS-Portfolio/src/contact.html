<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact | OKS Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&family=Manrope:wght@400;500;600;700&family=Oxanium:wght@800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://use.typekit.net/myd6mya.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="../data/projects.js"></script>
    <script defer src="./js/theme.js"></script>
    <script defer src="./js/background.js"></script>
    <script defer src="./js/site.js"></script>
    <script defer src="./js/contact.js"></script>
  </head>
  <body data-page="contact" data-context="Digital">
    <canvas id="bgCanvas" class="bg-canvas" aria-hidden="true"></canvas>
    <div class="grid-overlay" aria-hidden="true"></div>

    <div class="header-wrap">
      <header class="site-header">
        <a class="brand-link" href="./index.html" aria-label="OKS Studio home">
          <img class="brand-logo" src="../assets/logos/OKSLogo.svg" alt="OKS Studio" />
        </a>

        <div class="header-actions">
          <nav class="site-nav" id="siteNav" aria-label="Primary">
            <a class="nav-link" data-route="home" href="./index.html">Home</a>
            <a class="nav-link" data-route="about" href="./about.html">About Me</a>
            <a class="nav-link" data-route="contact" href="./contact.html">Contact</a>
            <button class="nav-link nav-lab-toggle" id="accentLabToggle" type="button">Accent Lab</button>
          </nav>

          <button
            class="nav-hamburger"
            id="navHamburger"
            type="button"
            aria-label="Toggle navigation"
            aria-expanded="false"
            aria-controls="siteNav"
          >
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
          </button>

          <button
            class="theme-toggle"
            id="themeToggle"
            type="button"
            aria-label="Toggle theme"
            aria-pressed="false"
          >
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb"></span>
            </span>
          </button>
        </div>
      </header>
    </div>

    <main class="page page-contact">
      <section class="page-intro">
        <p class="eyebrow">Contact</p>
        <div class="split-headline">
          <h1 class="section-title">OKS Studio</h1>
          <p class="section-summary">
            Architecture, identity, and interface work shaped with the same calm, tactile point of
            view.
          </p>
        </div>
      </section>

      <section class="contact-layout">
        <article class="contact-panel">
          <p class="contact-line">Open to commissions, collaborations, and multidisciplinary work.</p>
          <div class="contact-tags">
            <span class="meta-tag">Architecture</span>
            <span class="meta-tag">Brand Direction</span>
            <span class="meta-tag">Digital Products</span>
          </div>
        </article>

        <aside class="contact-links">
          <a class="action-link" href="./index.html">Selected Work</a>
          <a class="action-link" href="./about.html">Practice Background</a>
        </aside>
      </section>
    </main>
  </body>
</html>
