<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coming Soon | The Classic Stripes</title>
  <style>
    :root {
      --page-bg: #ffffff;
      --ink: #111111;
      --card-bg: rgba(255, 255, 255, 0.86);
      --border: rgba(17, 17, 17, 0.08);
      --shadow: 0 24px 48px rgba(17, 17, 17, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(0, 0, 0, 0.04), transparent 42%),
        linear-gradient(180deg, #ffffff, #f4f4f1);
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(28px, 6vw, 56px);
      backdrop-filter: blur(10px);
    }

    img {
      width: clamp(260px, 48vw, 420px);
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.4rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
    }

    p {
      margin: 18px auto 0;
      max-width: 32ch;
      font-size: clamp(1rem, 2vw, 1.3rem);
      line-height: 1.5;
      color: rgba(17, 17, 17, 0.78);
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      padding: 14px 28px;
      border-radius: 14px;
      background: #111111;
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main>
    <img src="assets/images/logo.png" alt="The Classic Stripes" />
    <h1>Coming Soon</h1>
    <p>
      We are preparing this part of the shop right now. Please check back soon for the full drop.
    </p>
    <a href="index.html">Back to Home</a>
  </main>
</body>
</html>
